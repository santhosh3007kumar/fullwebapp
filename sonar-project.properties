# Basic Project Info
sonar.projectKey=devops-fullstack-project
sonar.projectName=DevOps Fullstack Project
sonar.projectVersion=1.0

# Source Code Locations
sonar.sources=frontend/src,backend
sonar.sourceEncoding=UTF-8

# Exclusions (node_modules, build artifacts)
sonar.exclusions=node_modules/**,frontend/build/**,frontend/node_modules/**,backend/node_modules/**,**/coverage/**

# Frontend JavaScript/TypeScript
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info

# Backend JavaScript
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info

# Test Files
sonar.tests=frontend/src,backend
sonar.test.inclusions=**/*.test.js,**/*.spec.js
